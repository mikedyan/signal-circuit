name = "signal-circuit-tournament"
main = "worker.js"
compatibility_date = "2026-05-01"

# Create the namespace first (Day 108: roadmap-spec binding name TOURNAMENT_KV):
#   wrangler kv:namespace create TOURNAMENT_KV
#   wrangler kv:namespace create TOURNAMENT_KV --preview
# then paste the ids below.
#
# Worker reads both env.TOURNAMENT_KV (Day 108 roadmap binding) and the legacy
# env.SIGNAL_CIRCUIT_TOURNAMENT (Day 93 binding) for backward compatibility, so
# either name works in deployed configurations.

[[kv_namespaces]]
binding = "TOURNAMENT_KV"
id = "REPLACE_WITH_PROD_NAMESPACE_ID"
preview_id = "REPLACE_WITH_PREVIEW_NAMESPACE_ID"

# Optional: pin a custom route once a Cloudflare zone is registered.
# routes = [
#   { pattern = "tournament.signal-circuit.app/*", zone_name = "signal-circuit.app" }
# ]
