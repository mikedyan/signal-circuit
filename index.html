<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signal Circuit — Logic Gate Puzzle Game</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- Level Select Screen -->
    <div id="level-select-screen">
      <div id="level-select-content">
        <h1 id="game-title">⚡ Signal Circuit</h1>
        <p id="game-subtitle">Logic Gate Puzzle Game</p>
        <div id="chapters-container"></div>

        <!-- Challenge Mode Section -->
        <div id="challenge-section">
          <div class="chapter-title">Challenge Mode</div>
          <div id="challenge-buttons">
            <button id="random-challenge-btn" class="challenge-btn">🎲 Random Challenge</button>
            <button id="sandbox-btn" class="challenge-btn">🔧 Sandbox</button>
          </div>
        </div>

        <button id="reset-progress-btn">Reset Progress</button>
      </div>
    </div>

    <!-- Challenge Config Screen -->
    <div id="challenge-config-screen" style="display:none;">
      <div id="challenge-config-content">
        <button id="challenge-back-btn">← Back</button>
        <h2 id="challenge-config-title">⚡ Random Challenge</h2>

        <div id="difficulty-controls">
          <div class="slider-group">
            <label>Inputs: <span id="input-count-label">2</span></label>
            <input type="range" id="input-count-slider" min="2" max="4" value="2">
          </div>
          <div class="slider-group">
            <label>Outputs: <span id="output-count-label">1</span></label>
            <input type="range" id="output-count-slider" min="1" max="2" value="1">
          </div>
          <div id="difficulty-badge">Easy</div>
        </div>

        <button id="generate-challenge-btn" class="challenge-btn generate-btn">⚡ Generate Challenge</button>

        <div id="leaderboard-section">
          <h3>🏆 Leaderboard</h3>
          <div id="leaderboard-container"></div>
          <button id="clear-leaderboard-btn">Clear Scores</button>
        </div>
      </div>
    </div>

    <!-- Gameplay Screen -->
    <div id="gameplay-screen" style="display:none;">
      <!-- Toolbox Sidebar -->
      <div id="toolbox">
        <button id="back-btn">← Back</button>
        <h2>Parts</h2>
      </div>

      <!-- Canvas Area -->
      <div id="canvas-container">
        <canvas id="game-canvas"></canvas>
        <canvas id="celebration-canvas"></canvas>
        <div id="onboarding-tooltip" style="display:none;">
          <span id="tooltip-text">Click a pin to start drawing a wire</span>
          <button id="tooltip-dismiss">Got it!</button>
        </div>
      </div>

      <!-- Info Panel -->
      <div id="info-panel">
        <div id="level-info">
          <h2 id="level-title">Loading...</h2>
          <p id="level-desc"></p>
        </div>

        <div id="level-nav">
          <button id="prev-level">◀ Prev</button>
          <button id="next-level">Next ▶</button>
        </div>

        <div id="truth-table-section">
          <h3>Truth Table</h3>
          <table id="truth-table"></table>
        </div>

        <div id="controls">
          <button id="run-btn">▶ RUN</button>
          <button id="clear-btn">Clear Circuit</button>
        <button id="hint-btn">💡 Hint</button>
        <div id="hint-display"></div>
        <button id="skip-btn" style="display:none;">⏭ Skip Level</button>
          <div id="result-display" class="idle">Build your circuit, then press RUN</div>
        </div>

        <div id="star-display" style="display:none;">
          <div id="stars-container"></div>
          <p id="star-message"></p>
          <button id="next-level-btn" style="display:none;">Next Level →</button>
        </div>

        <div id="status-bar">
          <span id="status-text">Ready</span>
          <button id="mute-btn" title="Toggle sound">🔊</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Drag ghost element -->
  <div id="drag-ghost"></div>
  <div id="victory-flash"></div>

  <!-- Scripts -->
  <script src="js/gates.js"></script>
  <script src="js/wires.js"></script>
  <script src="js/simulation.js"></script>
  <script src="js/levels.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/canvas.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
